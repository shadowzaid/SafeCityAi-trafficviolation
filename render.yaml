services:
  - type: web
    name: safecityai-api
    env: python
    plan: starter
    rootDir: backend
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SAFECITY_RATE_LIMIT
        value: 60/minute
